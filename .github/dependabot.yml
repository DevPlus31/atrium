version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    groups:
      composer-minor:
        update-types: [minor, patch]

  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
    groups:
      bun-minor:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
